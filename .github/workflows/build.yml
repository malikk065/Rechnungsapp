name: Build Rechnungsapp

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: Rechnungsapp-Windows
          path: dist/*.exe
          if-no-files-found: error

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: Rechnungsapp-macOS
          path: dist/*.dmg
          if-no-files-found: error

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Versionsnummer erzeugen
        id: version
        run: echo "tag=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Tag erstellen
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - uses: actions/download-artifact@v4
        with:
          name: Rechnungsapp-Windows
          path: release/

      - uses: actions/download-artifact@v4
        with:
          name: Rechnungsapp-macOS
          path: release/

      - name: Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Rechnungsapp ${{ steps.version.outputs.tag }}"
          body: |
            ## Download

            | System | Datei |
            |---|---|
            | **Windows** | `.exe` – herunterladen und doppelklicken |
            | **macOS** | `.dmg` – öffnen, App in Programme ziehen |
          files: release/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
